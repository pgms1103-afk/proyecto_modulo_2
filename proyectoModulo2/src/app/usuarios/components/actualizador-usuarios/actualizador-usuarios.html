<div class="modal-backdrop" *ngIf="esVisible" (click)="cerrar()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Editar usuario</h2>
      <button class="btn-cerrar-icon" (click)="cerrar()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="modal-body">

      <div class="seccion-titulo">Datos generales</div>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" class="form-input" placeholder="Nombres" />
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" class="form-input" placeholder="Apellidos" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Cédula</label>
          <input type="number" class="form-input" placeholder="1234567890" />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" class="form-input" placeholder="Nueva contraseña" />
        </div>
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" class="form-input" placeholder="correo@ejemplo.com" />
      </div>

      <div class="footer-seccion">
        <button class="btn-secundario" (click)="cerrar()">Cancelar</button>
        <button class="btn-primario">
          <i class="fa-solid fa-floppy-disk"></i> Guardar datos generales
        </button>
      </div>

      <div class="separador"></div>

      <div class="seccion-titulo">Cambiar tipo de usuario</div>

      <div class="role-selection-group">

        <label class="role-option">
          <input type="radio" name="tipo" value="normal">
          <div class="role-content">
            <i class="fa-solid fa-user"></i>
            <span>Normal</span>
            <small>$5.000</small>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="tipo" value="premium">
          <div class="role-content">
            <i class="fa-solid fa-star"></i>
            <span>Premium</span>
            <small>$3.500</small>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="tipo" value="concurrente">
          <div class="role-content">
            <i class="fa-solid fa-bolt"></i>
            <span>Concurrente</span>
            <small>$2.000</small>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="tipo" value="admin">
          <div class="role-content">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Admin</span>
            <small>Sin tarifa</small>
          </div>
        </label>

      </div>


      <div class="footer-seccion">
        <button class="btn-primario btn-tipo">
          <i class="fa-solid fa-floppy-disk"></i> Guardar tipo de usuario
        </button>
      </div>

    </div>

  </div>
</div>
