<div class="modal-backdrop" *ngIf="esVisible" (click)="cerrar()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Editar trabajador</h2>
      <button class="btn-cerrar-icon" (click)="cerrar()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="modal-body">

      <!-- Sección datos generales -->
      <div class="seccion-titulo">Datos generales</div>

      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" class="form-input" placeholder="Ej: Juan Pérez" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Cédula</label>
          <input type="text" class="form-input" placeholder="1.234.567.890" />
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" class="form-input" placeholder="310 123 4567" />
        </div>
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" class="form-input" placeholder="correo@empresa.co" />
      </div>

      <!-- Botón guardar datos generales -->
      <div class="footer-seccion">
        <button class="btn-secundario" (click)="cerrar()">Cancelar</button>
        <button class="btn-primario">
          <i class="fa-solid fa-floppy-disk"></i> Guardar datos generales
        </button>
      </div>

      <div class="separador"></div>

      <!-- Sección cargo -->
      <div class="seccion-titulo">Cambiar cargo</div>

      <div class="role-selection-group">

        <label class="role-option">
          <input type="radio" name="cargo" value="administrador">
          <div class="role-content">
            <i class="fa-solid fa-user-tie"></i>
            <span>Admin</span>
            <small>Oficina</small>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="cargo" value="conductor">
          <div class="role-content">
            <i class="fa-solid fa-truck"></i>
            <span>Conductor</span>
            <small>Logística</small>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="cargo" value="manipulador">
          <div class="role-content">
            <i class="fa-solid fa-box-open"></i>
            <span>Operario</span>
            <small>Bodega</small>
          </div>
        </label>

      </div>

      <!-- Botón guardar cargo -->
      <div class="footer-seccion">
        <button class="btn-primario btn-cargo">
          <i class="fa-solid fa-floppy-disk"></i> Guardar cargo
        </button>
      </div>

    </div>

  </div>
</div>
