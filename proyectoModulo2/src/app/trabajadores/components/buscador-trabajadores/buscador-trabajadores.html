<div class="search-section">
  <div class="search-wrapper">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
    <input type="text" class="search-input" placeholder="Buscar trabajador por nombre, cédula o cargo...">
  </div>

  <div class="filters-wrapper">
    <select class="filter-select">
      <option value="" disabled selected>Filtrar por Cargo</option>
      <option>Todos</option>
      <option>Admin</option>
      <option>Conductor</option>
      <option>Operario</option>
    </select>

    <button class="add-button" (click)="notificarNuevo()">
      Nuevo Trabajador
    </button>

    <button class="btn-refresh" title="Actualizar lista">
      <i class="fa-solid fa-rotate"></i>
    </button>
  </div>
</div>
