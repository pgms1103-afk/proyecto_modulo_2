<div class="modal-backdrop" *ngIf="esVisible" (click)="cerrar()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Nuevo trabajador</h2>
      <button class="btn-cerrar-icon" (click)="cerrar()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="nombre" class="form-input" placeholder="Nombre completo" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Cédula</label>
          <input type="number" class="form-input" placeholder="1.234.567.890" [(ngModel)]="cedula" />
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="number" class="form-input" placeholder="310 123 4567" [(ngModel)]="telefono"/>
        </div>
      </div>

      <div class="form-group">
        <label>Correo</label>
        <input type="email" class="form-input" placeholder="correo@empresa.co" [(ngModel)]="email" />
      </div>

      <label>Seleccionar Cargo</label>
      <div class="role-selection-group">
        <label class="role-option">
          <input type="radio" name="rol" value="Administrador" [(ngModel)]="cargo">
          <div class="role-content">
            <i class="fa-solid fa-user-tie"></i>
            <span>Admin</span>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="rol" value="Conductor" [(ngModel)]="cargo">
          <div class="role-content">
            <i class="fa-solid fa-truck"></i>
            <span>Conductor</span>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="rol" value="Manipulador" [(ngModel)]="cargo">
          <div class="role-content">
            <i class="fa-solid fa-box"></i>
            <span>Operario</span>
          </div>
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-secundario" (click)="cerrar()">Cancelar</button>
      <button class="btn-primario" (click)="crearTrabajador()">Guardar Trabajador</button>
    </div>
  </div>
</div>
