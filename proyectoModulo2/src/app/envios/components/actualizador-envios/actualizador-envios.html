<div class="modal-backdrop" *ngIf="esVisible" (click)="cerrar()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Editar envío</h2>
      <button class="btn-cerrar-icon" (click)="cerrar()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="modal-body">

      <!-- Sección datos generales -->
      <div class="seccion-titulo">Datos del envío</div>

      <div class="form-group">
        <label>Descripción</label>
        <input type="text" class="form-input" placeholder="Descripción del paquete"
               [(ngModel)]="descripcion" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Peso (kg)</label>
          <input type="number" class="form-input" placeholder="Ej: 2.5"
                 [(ngModel)]="peso" />
        </div>
        <div class="form-group">
          <label>Dirección destino</label>
          <input type="text" class="form-input" placeholder="Calle 45 #12-30"
                 [(ngModel)]="destino" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha de envío</label>
          <input type="datetime-local" class="form-input"
                 [(ngModel)]="fechaEnvio" />
        </div>
        <div class="form-group">
          <label>Fecha de entrega</label>
          <input type="datetime-local" class="form-input"
                 [(ngModel)]="fechaEntrega" />
        </div>
      </div>

      <!-- Botón guardar datos generales -->
      <div class="footer-seccion">
        <button class="btn-secundario" (click)="cerrar()">Cancelar</button>
        <button class="btn-primario" (click)="actualizarEnvio()">
          <i class="fa-solid fa-floppy-disk"></i> Guardar datos del envío
        </button>
      </div>

      <div class="separador"></div>

      <!-- Sección tipo de paquete -->
      <div class="seccion-titulo">Cambiar tipo de paquete</div>

      <div class="role-selection-group">

        <label class="role-option">
          <input type="radio" name="tipo" value="Alimenticio" [(ngModel)]="tipoPaquete">
          <div class="role-content">
            <i class="fa-solid fa-apple-whole"></i>
            <span>Alimenticio</span>
            <small>x5.000/kg · mismo día</small>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="tipo" value="No Alimenticio" [(ngModel)]="tipoPaquete">
          <div class="role-content">
            <i class="fa-solid fa-boxes-stacked"></i>
            <span>No Alimenticio</span>
            <small>x3.000/kg · 24h</small>
          </div>
        </label>

        <label class="role-option">
          <input type="radio" name="tipo" value="Carta" [(ngModel)]="tipoPaquete">
          <div class="role-content">
            <i class="fa-solid fa-envelope"></i>
            <span>Carta</span>
            <small>$2.000 fijo · 72h</small>
          </div>
        </label>

      </div>

      <!-- Botón guardar tipo -->
      <div class="footer-seccion">
        <button class="btn-primario btn-tipo" (click)="actualizarTipo()">
          <i class="fa-solid fa-floppy-disk"></i> Guardar tipo de paquete
        </button>
      </div>

    </div>

  </div>
</div>
