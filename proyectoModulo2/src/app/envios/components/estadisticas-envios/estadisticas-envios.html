<div class="stats-grid">

  <div class="stat-card total">
    <div class="stat-label">Total envíos <i class="fa-solid fa-box"></i></div>
    <div class="stat-value">{{ totalEnvios }}</div>
  </div>

  <div class="stat-card alimenticio">
    <div class="stat-label">Alimenticios <i class="fa-solid fa-apple-whole"></i></div>
    <div class="stat-value verde">{{ totalAlimenticios }}</div>
  </div>

  <div class="stat-card no-alimenticio">
    <div class="stat-label">No Alimenticios <i class="fa-solid fa-boxes-stacked"></i></div>
    <div class="stat-value azul">{{ totalNoAlimenticios }}</div>
  </div>

  <div class="stat-card carta">
    <div class="stat-label">Cartas <i class="fa-solid fa-envelope"></i></div>
    <div class="stat-value amarillo">{{ totalCartas }}</div>
  </div>

  <div class="stat-card a-tiempo">
    <div class="stat-label">A tiempo <i class="fa-solid fa-circle-check"></i></div>
    <div class="stat-value verde">{{ totalATiempo }}</div>
  </div>

  <div class="stat-card con-retraso">
    <div class="stat-label">Con retraso <i class="fa-solid fa-triangle-exclamation"></i></div>
    <div class="stat-value naranja">{{ totalConRetraso }}</div>
  </div>

</div>
